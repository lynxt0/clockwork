<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a1430"/>
      <stop offset="0.55" stop-color="#0d0b18"/>
      <stop offset="1" stop-color="#080610"/>
    </linearGradient>
    <radialGradient id="glow" cx="512" cy="512" r="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Squircle background -->
  <path d="M 230 24
           C 90 24, 24 90, 24 230
           L 24 794
           C 24 934, 90 1000, 230 1000
           L 794 1000
           C 934 1000, 1000 934, 1000 794
           L 1000 230
           C 1000 90, 934 24, 794 24
           Z"
        fill="url(#bg)"/>

  <!-- Inner glow -->
  <circle cx="512" cy="512" r="380" fill="url(#glow)"/>

  <!-- Clock ring -->
  <circle cx="512" cy="512" r="300" fill="none" stroke="url(#ring)" stroke-width="48" stroke-linecap="round"/>

  <!-- Tick marks at 12, 3, 6, 9 -->
  <g stroke="#7c5cff" stroke-width="22" stroke-linecap="round" opacity="0.85">
    <line x1="512" y1="172" x2="512" y2="222"/>
    <line x1="852" y1="512" x2="802" y2="512"/>
    <line x1="512" y1="852" x2="512" y2="802"/>
    <line x1="172" y1="512" x2="222" y2="512"/>
  </g>

  <!-- Hour hand (pointing to 2 ish) -->
  <line x1="512" y1="512" x2="660" y2="404" stroke="#ededf0" stroke-width="32" stroke-linecap="round"/>

  <!-- Minute hand (pointing to 10 ish) -->
  <line x1="512" y1="512" x2="376" y2="356" stroke="#a78bfa" stroke-width="24" stroke-linecap="round"/>

  <!-- Center pin -->
  <circle cx="512" cy="512" r="28" fill="#ededf0"/>
  <circle cx="512" cy="512" r="14" fill="#7c5cff"/>
</svg>
